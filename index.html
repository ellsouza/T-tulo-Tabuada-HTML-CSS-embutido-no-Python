<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabuada</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f8f7;
        --surface: #ffffff;
        --text: #1b1f23;
        --muted: #667085;
        --line: rgba(16, 24, 40, 0.12);
        --accent: #2e7d32;
        --accent-2: #1b5e20;
        --danger: #b42318;
        --radius: 14px;
        --shadow: 0 16px 40px rgba(16, 24, 40, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Liberation Sans",
          sans-serif;
        background: radial-gradient(1000px 420px at 15% 10%, rgba(46, 125, 50, 0.1), transparent 55%),
          radial-gradient(900px 520px at 90% 20%, rgba(46, 125, 50, 0.08), transparent 60%), var(--bg);
        color: var(--text);
        line-height: 1.55;
      }

      a {
        color: inherit;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .wrap {
        width: min(100% - 32px, 860px);
        margin: 44px auto;
      }

      .card {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        overflow: hidden;
      }

      .card-head {
        padding: 22px 22px 16px;
        background: linear-gradient(180deg, rgba(46, 125, 50, 0.08), rgba(46, 125, 50, 0));
        border-bottom: 1px solid var(--line);
      }

      h1 {
        margin: 0;
        font-size: 18px;
        letter-spacing: -0.01em;
      }

      .sub {
        margin: 8px 0 0;
        font-size: 13px;
        color: var(--muted);
      }

      .card-body {
        padding: 18px 22px 22px;
      }

      form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin: 0;
      }

      input {
        width: 100%;
        padding: 12px 12px;
        border: 1px solid var(--line);
        border-radius: 12px;
        outline: none;
        font-size: 14px;
        background: #fff;
        transition: border-color 0.15s ease, box-shadow 0.15s ease;
      }

      input:focus {
        border-color: rgba(46, 125, 50, 0.55);
        box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.14);
      }

      button {
        padding: 12px 14px;
        border: 1px solid rgba(46, 125, 50, 0.32);
        background: rgba(46, 125, 50, 0.08);
        color: var(--accent-2);
        border-radius: 12px;
        cursor: pointer;
        font-weight: 700;
        letter-spacing: 0.02em;
        transition: transform 0.08s ease, background 0.15s ease, border-color 0.15s ease;
      }

      button:hover {
        background: rgba(46, 125, 50, 0.12);
        border-color: rgba(46, 125, 50, 0.44);
      }

      button:active {
        transform: translateY(1px);
      }

      .error {
        margin: 14px 0 0;
        padding: 12px 12px;
        background: rgba(244, 63, 94, 0.06);
        border: 1px solid rgba(244, 63, 94, 0.22);
        border-radius: 12px;
        color: var(--danger);
        font-size: 13px;
      }

      .results {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
        margin-top: 16px;
      }

      .panel {
        background: rgba(16, 24, 40, 0.02);
        border: 1px solid var(--line);
        border-radius: 14px;
        padding: 14px 14px;
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 13px;
        color: var(--accent-2);
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      ul {
        margin: 0;
        padding: 0;
        list-style: none;
      }

      li {
        display: flex;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 10px;
        border-radius: 10px;
      }

      li:nth-child(odd) {
        background: rgba(16, 24, 40, 0.03);
      }

      .eq {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
        color: rgba(27, 31, 35, 0.92);
      }

      strong {
        color: var(--accent-2);
      }

      .footer {
        margin: 14px 0 0;
        text-align: center;
        color: var(--muted);
        font-size: 12px;
      }

      .footer a {
        color: var(--accent-2);
        text-decoration: none;
        font-weight: 700;
      }

      .footer a:hover {
        text-decoration: underline;
      }

      @media (max-width: 720px) {
        .wrap {
          margin: 24px auto;
        }

        .card-head {
          padding: 18px 16px 14px;
        }

        .card-body {
          padding: 16px 16px 18px;
        }

        form {
          grid-template-columns: 1fr;
        }

        button {
          width: 100%;
        }

        .results {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" aria-label="Tabuada">
        <header class="card-head">
          <h1>Tabuada (for) + Pares (while)</h1>
          <p class="sub">Versão estática (HTML + JS). Dica: use <code>?n=7</code> na URL.</p>
        </header>

        <div class="card-body">
          <form id="form">
            <input id="n" name="n" type="number" placeholder="Digite um número inteiro" inputmode="numeric" required />
            <button type="submit">Gerar</button>
          </form>

          <p id="error" class="error" role="alert" hidden></p>

          <div class="results" aria-label="Resultados">
            <section class="panel" aria-label="Tabuada">
              <h2>Tabuada</h2>
              <ul id="tabuada-list"></ul>
            </section>
            <section class="panel" aria-label="Pares">
              <h2>Pares</h2>
              <ul id="pares-list"></ul>
            </section>
          </div>

          <noscript>
            <p class="error">Ative o JavaScript para gerar a tabuada.</p>
          </noscript>
        </div>
      </section>

      <footer class="footer">
        Desenvolvido por
        <a href="https://ellsouza.github.io/ellen-portfolio/" target="_blank" rel="noopener noreferrer">Ellen Souza</a>
      </footer>
    </main>

    <script>
      const input = document.querySelector("#n");
      const form = document.querySelector("#form");
      const errorEl = document.querySelector("#error");
      const tabuadaList = document.querySelector("#tabuada-list");
      const paresList = document.querySelector("#pares-list");

      const setError = (message) => {
        if (!message) {
          errorEl.hidden = true;
          errorEl.textContent = "";
          return;
        }
        errorEl.hidden = false;
        errorEl.textContent = message;
      };

      const clearLists = () => {
        tabuadaList.innerHTML = "";
        paresList.innerHTML = "";
      };

      const render = (n) => {
        clearLists();
        if (n === null) return;

        for (let i = 1; i <= 10; i += 1) {
          const li = document.createElement("li");
          li.innerHTML = `<span class="eq">${n} × ${i} =</span> <strong>${n * i}</strong>`;
          tabuadaList.appendChild(li);
        }

        let contador = 1;
        while (contador <= 10) {
          const li = document.createElement("li");
          li.innerHTML = `<span class="eq">contador=${contador} →</span> <strong>${contador * 2}</strong>`;
          paresList.appendChild(li);
          contador += 1;
        }
      };

      const parseIntStrict = (value) => {
        if (typeof value !== "string") return null;
        const trimmed = value.trim();
        if (!trimmed) return null;
        if (!/^-?\d+$/.test(trimmed)) return Number.NaN;
        return Number.parseInt(trimmed, 10);
      };

      const loadFromUrl = () => {
        const params = new URLSearchParams(window.location.search);
        const nRaw = params.get("n");
        if (!nRaw) {
          render(null);
          return;
        }
        input.value = nRaw;
        const nParsed = parseIntStrict(nRaw);
        if (!Number.isInteger(nParsed)) {
          setError("Digite um número inteiro válido.");
          render(null);
          return;
        }
        setError("");
        render(nParsed);
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const nRaw = String(input.value);
        const nParsed = parseIntStrict(nRaw);
        if (!Number.isInteger(nParsed)) {
          setError("Digite um número inteiro válido.");
          render(null);
          return;
        }
        setError("");
        const url = new URL(window.location.href);
        url.searchParams.set("n", String(nParsed));
        window.history.replaceState({}, "", url);
        render(nParsed);
      });

      loadFromUrl();
    </script>
  </body>
</html>
