<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Tabuada</title>
    <style>
      :root {
        --bg: #f4f7ff;
        --surface: #ffffff;
        --text: #0f172a;
        --muted: #64748b;
        --line: rgba(15, 23, 42, 0.12);
        --blue: #2563eb;
        --radius: 12px;
        --shadow: 0 16px 40px rgba(2, 6, 23, 0.08);
      }

      * { box-sizing: border-box; }

      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background: var(--bg);
        color: var(--text);
        line-height: 1.55;
      }

      code {
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      }

      .wrap {
        min-height: 100svh;
        display: grid;
        place-items: center;
        padding: 28px 16px;
      }

      .card {
        width: min(520px, 100%);
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 18px;
      }

      h1 {
        margin: 0 0 6px;
        font-size: 20px;
        color: var(--blue);
      }

      .sub {
        margin: 0 0 14px;
        font-size: 13px;
        color: var(--muted);
      }

      form {
        display: flex;
        gap: 10px;
        margin: 0 0 10px;
      }

      input {
        flex: 1;
        padding: 12px;
        border: 1px solid var(--line);
        border-radius: 10px;
        outline: none;
        font-size: 14px;
      }

      input:focus {
        border-color: rgba(37, 99, 235, 0.6);
        box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
      }

      button {
        padding: 12px 14px;
        border: 1px solid rgba(37, 99, 235, 0.35);
        background: rgba(37, 99, 235, 0.08);
        color: #1e3a8a;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 700;
      }

      button:hover { background: rgba(37, 99, 235, 0.12); }

      .error {
        margin: 10px 0 0;
        padding: 10px 12px;
        border-radius: 10px;
        color: #991b1b;
        border: 1px solid rgba(153, 27, 27, 0.25);
        background: rgba(239, 68, 68, 0.08);
        font-size: 13px;
      }

      .results {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
        margin-top: 14px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 10px;
        padding: 12px;
        background: #fbfdff;
      }

      .panel h2 {
        margin: 0 0 8px;
        font-size: 13px;
        color: #1e3a8a;
      }

      ul { margin: 0; padding: 0; list-style: none; }

      li {
        display: flex;
        justify-content: space-between;
        gap: 10px;
        padding: 6px 8px;
        border-radius: 8px;
      }

      li:nth-child(odd) { background: rgba(15, 23, 42, 0.03); }

      .eq { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace; }

      strong { color: #1e3a8a; }

      .footer {
        margin-top: 14px;
        text-align: center;
        color: var(--blue);
        font-size: 12px;
      }

      .footer a {
        color: var(--blue);
        text-decoration: none;
        font-weight: 700;
      }

      .footer a:hover { text-decoration: underline; }

      @media (max-width: 520px) {
        form { flex-direction: column; }
        button { width: 100%; }
        .results { grid-template-columns: 1fr; }
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" aria-label="Tabuada">
        <h1>Tabuada</h1>
        <p class="sub">Versão HTML + JS. Use <code>?n=7</code> na URL, se quiser.</p>

        <form id="form">
          <input id="n" name="n" type="number" placeholder="Digite um número inteiro" inputmode="numeric" required />
          <button type="submit">Gerar</button>
        </form>

        <p id="error" class="error" role="alert" hidden></p>

        <div class="results" aria-label="Resultados">
          <section class="panel" aria-label="Tabuada">
            <h2>Tabuada (for)</h2>
            <ul id="tabuada-list"></ul>
          </section>
          <section class="panel" aria-label="Pares">
            <h2>Pares (while)</h2>
            <ul id="pares-list"></ul>
          </section>
        </div>

        <noscript>
          <p class="error">Ative o JavaScript para gerar a tabuada.</p>
        </noscript>

        <footer class="footer">
          Desenvolvido por
          <a href="https://ellsouza.github.io/ellen-portfolio/" target="_blank" rel="noopener noreferrer">Ellen Souza</a>
        </footer>
      </section>
    </main>

    <script>
      const input = document.querySelector("#n");
      const form = document.querySelector("#form");
      const errorEl = document.querySelector("#error");
      const tabuadaList = document.querySelector("#tabuada-list");
      const paresList = document.querySelector("#pares-list");

      const setError = (message) => {
        if (!message) {
          errorEl.hidden = true;
          errorEl.textContent = "";
          return;
        }
        errorEl.hidden = false;
        errorEl.textContent = message;
      };

      const clearLists = () => {
        tabuadaList.innerHTML = "";
        paresList.innerHTML = "";
      };

      const render = (n) => {
        clearLists();
        if (n === null) return;

        for (let i = 1; i <= 10; i += 1) {
          const li = document.createElement("li");
          li.innerHTML = `<span class="eq">${n} × ${i} =</span> <strong>${n * i}</strong>`;
          tabuadaList.appendChild(li);
        }

        let contador = 1;
        while (contador <= 10) {
          const li = document.createElement("li");
          li.innerHTML = `<span class="eq">contador=${contador} →</span> <strong>${contador * 2}</strong>`;
          paresList.appendChild(li);
          contador += 1;
        }
      };

      const parseIntStrict = (value) => {
        if (typeof value !== "string") return null;
        const trimmed = value.trim();
        if (!trimmed) return null;
        if (!/^-?\d+$/.test(trimmed)) return Number.NaN;
        return Number.parseInt(trimmed, 10);
      };

      const loadFromUrl = () => {
        const params = new URLSearchParams(window.location.search);
        const nRaw = params.get("n");
        if (!nRaw) {
          render(null);
          return;
        }
        input.value = nRaw;
        const nParsed = parseIntStrict(nRaw);
        if (!Number.isInteger(nParsed)) {
          setError("Digite um número inteiro válido.");
          render(null);
          return;
        }
        setError("");
        render(nParsed);
      };

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const nRaw = String(input.value);
        const nParsed = parseIntStrict(nRaw);
        if (!Number.isInteger(nParsed)) {
          setError("Digite um número inteiro válido.");
          render(null);
          return;
        }
        setError("");
        const url = new URL(window.location.href);
        url.searchParams.set("n", String(nParsed));
        window.history.replaceState({}, "", url);
        render(nParsed);
      });

      loadFromUrl();
    </script>
  </body>
</html>
